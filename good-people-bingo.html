    <style id="self">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --bingo-font: 'Noto Sans JP', 'Noto Sans SC', sans-serif;
        }

        body {
            font-family: var(--bingo-font);
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* 画像生成用の隠しエリアではなく表示用 */
        #capture-area {
            background-color: white;
            padding: 40px;
            width: 800px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .bingo-container {
            width: 100%;
            background: white;
        }

        .title {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.15em;
            color: black;
        }

        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            border-bottom: 2px solid black;
            padding-bottom: 12px;
            margin-bottom: 25px;
            color: black;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border: 2.5px solid black;
        }

        .bingo-cell {
            aspect-ratio: 1 / 1;
            border: 1px solid black;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.4;
            cursor: pointer;
            user-select: none;
            word-break: break-all;
            position: relative;
            background: white;
            color: black;
        }

        /* 印（○）の表現 */
        .bingo-cell.marked::after {
            content: "";
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid rgba(239, 68, 68, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 1.2rem;
            font-style: italic;
            border-bottom: 1.5px solid #000;
            display: inline-block;
            width: 100%;
            padding-bottom: 8px;
            color: black;
        }

        /* プレビュー用モーダル */
        #preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        #preview-image {
            max-width: 90%;
            max-height: 80%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: white;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 8px 16px;
            border: 1px solid #374151;
            background: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover {
            background: #f3f4f6;
        }

        button.active {
            background: #1f2937;
            color: white;
        }

        .primary-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
        }

        .primary-btn:hover {
            background-color: #2563eb;
        }

        @media (max-width: 800px) {
            #capture-area { width: 95vw; padding: 15px; }
            .title { font-size: 1.8rem; }
            .subtitle { font-size: 0.75rem; }
            .bingo-cell { font-size: 0.65rem; padding: 4px; }
            .footer { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button onclick="changeLang('zh')" id="btn-zh" class="active">中文 (Original)</button>
        <button onclick="changeLang('ja')" id="btn-ja">日本語</button>
        <button onclick="changeLang('en')" id="btn-en">English</button>
        <button onclick="showPreview()" class="primary-btn">画像プレビューを表示</button>
        <button onclick="resetBoard()">リセット</button>
        <button href="https://x.com/k0ns10">作者</button>
    </div>

    <!-- 編集・表示エリア -->
    <div id="capture-area">
        <div class="bingo-container">
            <div class="title" id="display-title">健全人BINGO</div>
            <div class="subtitle" id="display-subtitle">（如果五个連成一條線，那麼恭喜你，你是現在偏少見的健全人）</div>

            <div class="bingo-grid" id="grid"></div>

            <div class="footer" id="display-footer">
                （即使不是健全人，又活了一天，真棒！）
            </div>
        </div>
    </div>

    <!-- プレビュー用モーダル -->
    <div id="preview-modal">
        <div class="text-white mb-4 text-center">
            <p class="text-lg font-bold">画像プレビュー</p>
            <p class="text-sm opacity-80">画像を長押し、または右クリックで保存してね</p>
        </div>
        <img id="preview-image" src="" alt="Bingo Preview">
        <div class="mt-6">
            <button onclick="closePreview()" class="px-8 py-2">閉じる</button>
        </div>
    </div>

    <script>
        const translations = {
            zh: {
                title: "健全人BINGO",
                subtitle: "（如果五个連成一條線，那麼恭喜你，你是現在偏少見的健全人）",
                footer: "（即使不是健全人，又活了一天，真棒！）",
                items: [
                    "沒有先天重大疾病或身體缺陷", "沒有負債與過量超前消費行為", "對人生有規劃且有執行的精力", "性格外傾或總能在外保持舒展", "有愛自己的人或能深度共鳴的摯友",
                    "沒有或極少關注自己幸不幸幅", "無失眠、早醒等睡眠障礙", "沒有藥物濫用行為(od)", "能夠做到每天出門", "不長期處於過勞與身體透支狀態",
                    "沒有過自殘行為與自毀傾向", "沒有外貌焦慮、體重焦慮", "無暴食與催吐等進食障礙行為", "有兩個以上能隨時說上話的好朋友", "有多個愛好並能為愛好消費",
                    "非單親家庭及無至親去世", "較少驚恐，不每次衝突中都想到直奔毀滅", "沒有酒精與香煙依賴", "沒有過休學與退學經歷", "無頭疼胃疼等焦慮軀體化症狀",
                    "無父母家暴無學校霸凌", "能靠自己工作努力養活自己", "沒有確診過任何心理疾病", "無鏡頭恐懼相冊裡有很多本人照片", "沒有明顯的創傷經歷與CPTSD"
                ]
            },
            ja: {
                title: "健全人ビンゴ",
                subtitle: "（5つ並んだらおめでとう、君は現代では珍しい「健全な人」だよ）",
                footer: "（健全じゃなくても、今日も一日生きた。偉い！）",
                items: [
                    "先天的な重大疾患や身体的欠陥がない", "借金や過度な浪費習慣がない", "人生に計画があり、実行する気力がある", "外向的、または人前で常にリラックスできる", "自分を愛してくれる人や深く共鳴できる親友がいる",
                    "自分が幸せか不幸せかをほとんど気にしない", "不眠や早朝覚醒などの睡眠障害がない", "薬物濫用（オーバードーズ等）がない", "毎日外出することができる", "長期的な過労や身体の酷使状態にない",
                    "自傷行為や自暴自棄な傾向がない", "外見や体重に対する強い不安がない", "過食や嘔吐などの摂食障害がない", "いつでも話せる親友が2人以上いる", "複数の趣味があり、そのためにお金を使える",
                    "ひとり親家庭ではなく、近親者の死去を経験していない", "パニックになりにくく、衝突時にすぐ破滅を考えない", "アルコールやタバコへの依存がない", "休学や退学の経験がない", "頭痛や腹痛などの不安による身体化症状がない",
                    "家庭内暴力や学校でのいじめを経験していない", "自分の仕事と努力で自立して生活できている", "精神疾患の診断を受けたことがない", "カメラ恐怖症がなく、アルバムに自分の写真が多い", "明らかなトラウマ体験やCPTSDがない"
                ]
            },
            en: {
                title: "Healthy Person BINGO",
                subtitle: "(If you get five in a row, congrats! You are a rare 'healthy person' today.)",
                footer: "(Even if you aren't, you survived another day. Awesome!)",
                items: [
                    "No congenital major diseases or physical defects", "No debt or excessive overspending", "Has life plans and energy to execute them", "Extroverted or always relaxed in public", "Has people who love them or soulmates",
                    "Rarely obsessed with their own happiness", "No sleep disorders like insomnia", "No history of drug abuse (OD)", "Able to go out every day", "Not chronically overworked or exhausted",
                    "No history of self-harm or self-destructive tendencies", "No appearance or weight anxiety", "No eating disorders (binging/purging)", "At least 2 friends to talk to anytime", "Multiple hobbies and can spend on them",
                    "Not from a single-parent home; no loss of immediate family", "Few panics; doesn't jump to 'destruction' during conflict", "No dependence on alcohol or cigarettes", "No history of dropping out or leave of absence", "No somatization (headaches/stomachaches from anxiety)",
                    "No domestic violence or school bullying", "Able to support oneself through work", "Never diagnosed with a mental illness", "No camera shyness; many photos of self in album", "No significant trauma history or CPTSD"
                ]
            }
        };

        let currentLang = 'zh';
        const markedCells = new Set();

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            translations[currentLang].items.forEach((text, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                if (markedCells.has(index)) cell.classList.add('marked');
                cell.innerText = text;
                cell.onclick = () => toggleMark(index, cell);
                grid.appendChild(cell);
            });
        }

        function toggleMark(index, element) {
            if (markedCells.has(index)) {
                markedCells.delete(index);
                element.classList.remove('marked');
            } else {
                markedCells.add(index);
                element.classList.add('marked');
            }
        }

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('display-title').innerText = translations[lang].title;
            document.getElementById('display-subtitle').innerText = translations[lang].subtitle;
            document.getElementById('display-footer').innerText = translations[lang].footer;
            
            ['zh', 'ja', 'en'].forEach(l => {
                document.getElementById(`btn-${l}`).classList.toggle('active', l === lang);
            });

            initGrid();
        }

        function resetBoard() {
            markedCells.clear();
            initGrid();
        }

        // 画像プレビューを表示する関数
        async function showPreview() {
            const area = document.getElementById('capture-area');
            const modal = document.getElementById('preview-modal');
            const previewImg = document.getElementById('preview-image');

            // html2canvasでキャプチャ
            const canvas = await html2canvas(area, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff"
            });
            
            previewImg.src = canvas.toDataURL('image/png');
            modal.style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
        }

        window.onload = initGrid;
    </script>
</body>
</html>
